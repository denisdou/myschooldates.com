              - article [ref=f84e178]:
                - generic [ref=f84e179]:
                  - generic [ref=f84e180]: Thurston Middle School’s athletic program provides students with a variety of opportunities to get involved, compete, and grow. Through sports, student-athletes develop essential life skills such as teamwork, perseverance, dedication, and discipline.Each year, students fill approximately 350 roster spots across TMS athletics, with many student-athletes choosing to participate in more than one sport. TMS offers a wide range of athletic opportunities throughout the year:🍂 Fall• Girls Basketball• Boys Volleyball❄️ Winter• Boys Basketball• Girls Volleyball• Cross Country🌷 Spring• Boys & Girls Track and Field• Boys & Girls Soccer

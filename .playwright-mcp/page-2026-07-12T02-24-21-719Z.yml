              - article [ref=f84e162]:
                - generic [ref=f84e163]:
                  - generic [ref=f84e164]: 👀 Last week, the Laguna Beach Police Department hosted its free Teen Leadership Academy for students enrolled to attend Laguna Beach High School this fall. Participants developed leadership skills, explored career pathways, and connected with LBPD professionals through hands-on learning experiences.One highlight of the week was a behind-the-scenes tour of the House of Blues Anaheim. Students explored the concert venues, backstage areas, green rooms, and even the exclusive VIP spaces. Along the way, they heard inspiring stories about adaptability, problem-solving, perseverance, and the many opportunities available within the music and entertainment industry.A huge thank you to the @lagunabeachpd , especially our School Resource Officers (SROs) and Community Service Officer, for making these career exploration opportunities possible and helping our students gain valuable real-world exposure. 👏
                  - generic [ref=f84e165]:
                    - link " 0" [ref=f84e166] [cursor=pointer]:
                      - /url: https://www.instagram.com/p/DaTkAJhkuvB/
                    - link " 0" [ref=f84e167] [cursor=pointer]:
                      - /url: https://www.instagram.com/p/DaTkAJhkuvB/
                - link " Link" [ref=f84e169] [cursor=pointer]:
                  - /url: https://www.instagram.com/p/DaTkAJhkuvB/
              - article [ref=f84e170]:
                - generic [ref=f84e171]:
                  - generic [ref=f84e172]: This summer, three Laguna Beach High School students have their ceramic artwork featured online for the American Museum of Ceramic Art (AMOCA) in Pomona, California. AMOCA celebrates the artistry, innovation, and craftsmanship of ceramic work, and this year three LBHS students were recognized for their outstanding creations.Congratulations to:🎨 Easton Shalala — Blooming Rim Cup🎨 Jo Foulger — Skull Mask 🎨 Sofia Carr — Sophisticated Rabbit We invite you to check out their featured pieces in this post! Their artwork is truly remarkable and showcases the creativity, skill, and dedication of our talented student artists.
                  - generic [ref=f84e173]:
                    - link " 0" [ref=f84e174] [cursor=pointer]:

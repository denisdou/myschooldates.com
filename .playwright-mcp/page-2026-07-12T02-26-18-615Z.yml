      - 'region "YouTube channel: The Slice: Positive News from OCPS" [ref=f117e937]':
        - 'heading "The Slice: Positive News from OCPS" [level=2] [ref=f117e940]'
      - generic [ref=f117e948]:
        - paragraph [ref=f117e949]:
          - strong [ref=f117e951]: Our Values
        - paragraph [ref=f117e952]:
          - generic [ref=f117e953]: Safety. People First. Integrity. Collaboration. Excellence.
      - generic [ref=f117e956]:
        - generic [ref=f117e958]:
          - paragraph [ref=f117e959]:
            - strong [ref=f117e961]: Hear firsthand from our students what they love about OCPS!
          - paragraph [ref=f117e962]: ⭐⭐⭐⭐⭐
          - paragraph [ref=f117e963]: “OCPS offers a wide range of programs, including Advanced Placement (AP), International Baccalaureate (IB), and career and technical education, catering to different student interests and academic needs. Many students and parents appreciate the dedication and commitment of teachers and staff who strive to provide quality education and support. The district provides numerous extracurricular opportunities, including sports, arts, and clubs, which enhance student engagement and development.”
        - generic [ref=f117e964]:
          - paragraph [ref=f117e966]:
            - img "A smiling student with curly hair stands in a school hallway."
          - generic [ref=f117e969]:
            - generic [ref=f117e971]:
              - heading "Current Student" [level=2] [ref=f117e973]
              - generic [ref=f117e974]: "\"I have been impressed with how many resources OCPS has provided to me and other students. They offer so many different opportunities for extracurriculars and other clubs.\""
            - generic [ref=f117e976]:
              - heading "Senior Student" [level=2] [ref=f117e978]
              - generic [ref=f117e979]: "\"My experience at Orange County Public Schools has been amazing. The teachers and the education are absolutely wonderful.\""
            - generic [ref=f117e981]:
              - heading "Junior Student" [level=2] [ref=f117e983]
              - generic [ref=f117e984]: "\"Orange County Public Schools has been a great experience for my family. The teachers are caring, professional, and truly care about helping students succeed. \""
      - generic [ref=f117e988]:
        - generic [ref=f117e989]:
          - paragraph [ref=f117e990]:
            - strong [ref=f117e992]: Enroll Now!
          - paragraph [ref=f117e993]:
            - generic [ref=f117e994]:
              - text: At OCPS, we believe that
              - strong [ref=f117e995]: every student deserves a thriving future,
              - text: "and it all starts with the right educational foundation. Our mission is clear:"
              - emphasis [ref=f117e996]: Together with our families and the community, we empower students with a superior academic experience, essential life skills, and boundless opportunities.
          - paragraph [ref=f117e997]: "When you enroll your child in OCPS, you’re choosing a district that is:"
          - paragraph [ref=f117e998]:
            - generic [ref=f117e999]:
              - img "A golden-yellow check mark on a white background."
              - strong [ref=f117e1000]: Rooted in Excellence
              - text: – High expectations for learning, top-tier academics, and a commitment to the OCPS Portrait of a Graduate.
              - generic [ref=f117e1001]:
                - img "A golden-yellow check mark on a white background."
              - strong [ref=f117e1002]: Focused on the Whole Child
              - text: – Prioritizing student well-being, social-emotional growth, and a safe, supportive environment.
              - generic [ref=f117e1003]:
                - img "A golden-yellow check mark on a white background."
              - strong [ref=f117e1004]: Driven by Values
              - text: – We lead with
              - strong [ref=f117e1005]: integrity
              - text: ", put"
              - strong [ref=f117e1006]: people first
              - text: ", and collaborate to deliver the highest standard of service."
          - paragraph [ref=f117e1007]:
            - generic [ref=f117e1009]:
              - generic [ref=f117e1010]:
                - img "A golden-yellow check mark on a white background."
              - strong [ref=f117e1011]: Rich in Opportunity
              - text: – From neighborhood schools to magnet programs, arts, athletics, and career pathways—your child’s journey is uniquely theirs.
          - paragraph [ref=f117e1012]:
            - generic [ref=f117e1013]:
              - generic [ref=f117e1014]:
                - img "A golden-yellow check mark on a white background."
              - strong [ref=f117e1015]: Equipped for Success
              - text: – With state-of-the-art facilities, outstanding support services, and a dedicated team, we ensure every student is prepared and inspired.
        - generic [ref=f117e1016]:
          - paragraph [ref=f117e1017]:
            - img "A smiling boy with a backpack stands in a school hallway, arms crossed."
          - paragraph [ref=f117e1018]:
            - generic [ref=f117e1019]:
              - strong [ref=f117e1020]: Parents, now is the time!
              - text: Click below to enroll your child and become part of a community that’s united in purpose and passionate about student success.
          - paragraph [ref=f117e1021]:
            - link "Enroll Now!" [ref=f117e1022] [cursor=pointer]:
              - /url: https://www.ocps.net/student-enrollment-home
      - generic [ref=f117e1026]:
        - generic [ref=f117e1027]:
          - paragraph [ref=f117e1028]:
            - strong [ref=f117e1031]: Stay Connected
          - paragraph [ref=f117e1032]: Whether it’s celebrating student achievements, sharing resources for parents, or providing essential updates, our social media channels are a great way to stay informed. Follow us now and never miss a moment!
          - paragraph [ref=f117e1033]:
            - link "The Facebook logo, a white 'f' on an orange square with a blue border.":
              - /url: https://www.facebook.com/OrangeCountyPublicSchools
              - img "The Facebook logo, a white 'f' on an orange square with a blue border."
            - link "A white letter X on an orange square with a dark blue border.":

      - generic [ref=f117e1222]: Contents © 2026 Orange County Public Schools
      - generic [ref=f117e1223]: "The School Board of Orange County, Florida, does not discriminate in admission or access to, or treatment or employment in its programs and activities, on the basis of race, color, religion, age, sex, national origin, marital status, disability, genetic information, sexual orientation, gender identity or expression, or any other reason prohibited by law. The School Board also provides equal access to Scouting America and other designated youth groups. This holds true for all students who are interested in participating in educational programs and/or extracurricular school activities. The following individuals at the Ronald Blocker Educational Leadership Center, 445 W. Amelia Street, Orlando, Florida 32801, attend to compliance matters: Equal Employment Opportunity (EEO) Officer & Title IX Coordinator: Keshara Cowans; ADA Coordinator: Jay Cardinali; Section 504 Coordinator: Tajuana Lee-Wenze. (407.317.3200)"

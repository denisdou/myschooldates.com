              - img "A white play button inside a white rectangle on an orange background, surrounded by a dark blue border."
          - paragraph [ref=f117e1034]:
            - strong [ref=f117e1036]: "#WeAreOCPS"
        - link "Powered by Curator.io" [ref=f117e1039] [cursor=pointer]:
          - /url: https://curator.io
      - generic [ref=f117e1043]:
        - generic [ref=f117e1044]:
          - paragraph [ref=f117e1045]:
            - strong [ref=f117e1047]: Join Our Team!
          - paragraph [ref=f117e1048]:
            - generic [ref=f117e1049]: Become one of over 23,000+ dedicated professionals making a difference every day at Orange County Public Schools. Whether you’re a teacher, counselor, bus driver, maintenance worker, or serve in one of many other important roles, OCPS employees work together to support student success and ensure every child is prepared, inspired and empowered for college, career, and life.
          - paragraph [ref=f117e1050]:
            - link "View Careers" [ref=f117e1051] [cursor=pointer]:
              - /url: https://www.ocps.net/careers-home
        - paragraph [ref=f117e1053]:
          - img "Image promoting OCPS careers, featuring a teacher, cafeteria worker, and bus driver."
      - generic [ref=f117e1058]:
        - paragraph [ref=f117e1059]:
          - strong [ref=f117e1060]:
            - generic [ref=f117e1061]: The OCPS Difference
        - paragraph [ref=f117e1063]: We’re not like every other school district. See what sets us apart.
      - generic [ref=f117e1068]:
        - generic [ref=f117e1070]:
          - heading "Strong Community and Neighborhood Schools" [level=2] [ref=f117e1071]
          - paragraph [ref=f117e1074]: We INSPIRE belonging and local pride, offering a high-quality education right in the heart of your community.
        - generic [ref=f117e1076]:
          - heading "Academic, Arts and Extracurricular Activities" [level=2] [ref=f117e1077]
          - paragraph [ref=f117e1080]: INSPIRING excellence through top-tier academics, arts, and diverse activities, fostering a lifelong love for learning in every student.
        - generic [ref=f117e1082]:
          - heading "Diverse Choices and Tailored Learning" [level=2] [ref=f117e1083]
          - paragraph [ref=f117e1086]: EMPOWERING every learner's path and passion with a wide array of choices, from magnets to language programs, ensuring something for everyone.
        - generic [ref=f117e1088]:
          - heading "High Expectations for Student Mastery" [level=2] [ref=f117e1089]
          - paragraph [ref=f117e1092]: We PREPARE students for boundless opportunities, setting high expectations for learning that leads to genuine student mastery and success.
      - generic [ref=f117e1097]:
        - generic [ref=f117e1099]:
          - heading "State-of-the-Art Facilities" [level=2] [ref=f117e1100]
          - paragraph [ref=f117e1103]: PREPARING students for success in modern, safe, and innovative spaces built to support student achievement and learning.
        - generic [ref=f117e1105]:
          - heading "Safe and Supportive Environment" [level=2] [ref=f117e1106]
          - paragraph [ref=f117e1109]: We EMPOWER students by maintaining a safe, supportive environment, prioritizing their social-emotional well-being.
        - generic [ref=f117e1111]:
          - heading "Dedicated, Student-Focused Team" [level=2] [ref=f117e1112]
          - paragraph [ref=f117e1115]: Our purposeful team EMPOWERS students, focusing on their success and delivering a superior academic experience.
        - generic [ref=f117e1117]:
          - heading "Engaged Community & Efficient Operations" [level=2] [ref=f117e1118]
          - paragraph [ref=f117e1121]: We PREPARE for success through efficient, fiscally sound operations and an actively engaged and invested community.

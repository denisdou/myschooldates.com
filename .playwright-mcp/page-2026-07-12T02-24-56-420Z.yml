              - paragraph [ref=f102e131]: Congratulations to our talented student artists! 🎨👏 Hillsborough County Public Schools earned top honors in the 2026 Congressional Art Competition, with students taking 1st-, 2nd-, and 3rd-place among entries from Florida's 16th Congressional District.Ireland Cates (Bloomingdale High) earned 1st Place, and her artwork, The Capitol, will be displayed for one year in the U.S. Capitol complex in Washington, D.C. Olivia Fields (Riverview High) received 2nd Place, and Madelyn Bowers (Bloomingdale High) earned 3rd Place.Special congratulations to Malik Dante Walker and Adam Nuykin of Sumner High School for being named Facebook Fan Favorite winners!We're so proud of these outstanding artists for showcasing the incredible talent and creativity found across HCPS! 🎉🎨

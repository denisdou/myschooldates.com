              - paragraph [ref=f102e95]: A vision from Alonso High School came to life at Lowry Elementary School! 🎨IB students Alessandra Varszegi and Alessia Elbooz brought their creativity and passion to their IB CAS (Creativity, Activity, Service) project by designing and painting a mural for the Lowry Elementary community. Over several months, students and staff watched their vision unfold, sparking conversations, excitement, and inspiration along the way.The completed mural is a beautiful example of student leadership, creativity, and the impact of bringing communities together through art.

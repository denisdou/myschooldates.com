              - generic [ref=f102e313]: 🍎📚✨ Last week, more than 1,500 educators from across the country — including 235 Hillsborough County Public Schools teachers and administrators representing more than 70 HCPS sites — attended the AVID Summer Institute in downtown Tampa.🎤 During the general session, hosted by Sarah Sajan of Armwood Collegiate Academy, attendees heard inspiring stories from keynote speaker Adele Szczech-Johnson of Durant High School, as well as Amari Jones, a former Hillsborough High School AVID student and current AVID teacher at Eisenhower Middle School, and Viviana Melendez, a former Strawberry Crest High School AVID student.🌟 Each speaker shared how AVID helped shape their educational journeys, careers, and commitment to student success, highlighting the lasting impact of the program on generations of learners and educators.🥁 Attendees were also treated to a high-energy musical performance by the Durant High School Drumline, bringing excitement, energy, and school spirit to the event!

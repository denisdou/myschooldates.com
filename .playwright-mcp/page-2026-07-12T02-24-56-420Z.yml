                - paragraph [ref=f102e73]:
                  - strong [ref=f102e74]: HALF-PENNY SALES TAX REFERENDUM
                - paragraph [ref=f102e75]: "We are proud that Hillsborough County Public Schools continues to be the #1 choice for families in our community. That success is possible because of the incredible support we receive from our families and community members."
                - paragraph [ref=f102e76]:
                  - text: One example of this support is the
                  - strong [ref=f102e77]: half-penny sales tax referendum
                  - text: approved by voters in 2018. At that time, our
                  - strong [ref=f102e78]: district faced more than $1 billion in deferred maintenance
                  - text: . Many schools needed immediate A/C replacements, roof and window repairs, and other facilities and technology upgrades.
                - paragraph [ref=f102e79]:
                  - text: Thanks to voters, the half-penny referendum provided funding to address these needs, with a promise that every school would receive at least $500,000 in improvements. Since then,
                  - strong [ref=f102e80]: more than $1.2 billion has been invested in school facilities, safety, and technology across the district
                  - text: .
                  - strong [ref=f102e81]: More than $680 million of that work was awarded to local businesses
                  - text: ", supporting jobs in our community."
                - paragraph [ref=f102e82]:
                  - text: We are grateful for your continued support. If you would like more information about the referendum and the projects it has funded, please visit the district’s website >>
                  - link "https://www.hillsboroughschools.org/o/hcps/page/half-penny-sales-tax-referendum" [ref=f102e83] [cursor=pointer]:
                    - /url: https://www.hillsboroughschools.org/o/hcps/page/half-penny-sales-tax-referendum

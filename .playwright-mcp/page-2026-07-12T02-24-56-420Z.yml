              - generic [ref=f102e105]: Your Next Opportunity Starts Here!At Hillsborough County Public Schools, excellence isn't just our standard—it's who we are. As an "A"- graded school district, the 7th-largest in the nation, and one of the largest employers in the Tampa Bay region, we're looking for passionate professionals who are ready to make a difference.We're hiring for the 2026–2027 school year, including:Elementary teachersMiddle and high school teachers in high-need subject areasSpecial education teachersSchool nursesSchool counselorsBus driversand More!Whether you're launching your career, taking the next step, a military veteran or a career-changer, you'll find meaningful work, opportunities to grow, and the chance to make a lasting impact on students and our community.More Opportunities Start Here. Explore career opportunities and apply today at HCPSJobs.com.

          - heading "Non-Discrimination Policy" [level=2] [ref=f121e381]
          - paragraph [ref=f121e383]:
            - text: "The Sacramento Unified School District prohibits discrimination, intimidation, harassment (including sexual harassment) or bullying based on a person’s actual or perceived ancestry, color, disability, gender, gender identity, gender expression, immigration status, nationality, race or ethnicity, religion, sex, sexual orientation, or association with a person or a group with one or more of these actual or perceived characteristics or affiliation with Scouting America. For questions or complaints please contact the following staff: Title IX Coordinator (personnel related): Melinda Iremonger – 5735 47th Avenue, Sacramento, CA, 95824 – 916.643.7446 –"
            - link "melinda-iremonger@scusd.edu" [ref=f121e384] [cursor=pointer]:
              - /url: mailto:melinda-iremonger@scusd.edu

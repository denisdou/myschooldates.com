          - heading "Learn Where You Belong" [level=2] [ref=f121e67]
          - paragraph [ref=f121e69]: At Sac City Unified, we are committed to providing equitable access to high-quality education for all students. Through academic and social-emotional support, and creating welcoming and inclusive environments, we inspire every student to graduate, college and career ready, prepared to grow, thrive, and lead in a diverse world.
          - paragraph [ref=f121e72]:
            - link "Learn How to Enroll" [ref=f121e73] [cursor=pointer]:
              - /url: /fs/pages/802
        - generic [ref=f121e79]:
          - button "Previous" [disabled] [ref=f121e80] [cursor=pointer]: Previous
          - generic [ref=f121e82]:
            - generic [ref=f121e83]:
              - generic [ref=f121e84]:
                - heading "Academic Programs" [level=2] [ref=f121e85]
                - paragraph [ref=f121e86]: No matter what your student's interests, strengths, passions, or grade level are, Sac City Unified has a school program that fits their needs. From dual immersion, to International Baccalaureate, to Waldorf-inspired, to specialized college and career pathways, we offer something for every learner.
              - article [ref=f121e88]:
                - figure [ref=f121e89]:
                  - img "Elementary school Black student studying at a desk in a classroom" [ref=f121e91]
              - paragraph [ref=f121e94]:
                - link "Learn More" [ref=f121e95] [cursor=pointer]:
                  - /url: /fs/pages/804
            - generic [ref=f121e96]:
              - generic [ref=f121e97]:
                - heading [level=2] [ref=f121e98]: TK and Kindergarten
                - paragraph [ref=f121e99]: Transitional Kindergarten (TK) and Kindergarten are exciting first steps in your child’s learning journey! TK gives younger children a nurturing start, while Kindergarten builds confidence with reading, math, and hands-on discovery. Both programs help your child get ready for a bright future in school.
              - article [ref=f121e101]:
                - figure [ref=f121e102]
              - paragraph [ref=f121e107]:
                - link [ref=f121e108] [cursor=pointer]:
                  - /url: /fs/pages/810
                  - text: Learn More
            - generic [ref=f121e109]:
              - generic [ref=f121e110]:
                - heading [level=2] [ref=f121e111]: Dual Immersion
                - paragraph [ref=f121e112]: Our dual immersion programs foster bilingual fluency, cultural awareness, and academic excellence. Students in Spanish, Mandarin, or Hmong immersion balance learning with English to achieve biliteracy and biculturalism.
              - article [ref=f121e114]:
                - figure [ref=f121e115]
              - paragraph [ref=f121e120]:
                - link [ref=f121e121] [cursor=pointer]:
                  - /url: /fs/pages/21881
                  - text: Learn More
            - generic [ref=f121e122]:
              - generic [ref=f121e123]:
                - heading [level=2] [ref=f121e124]: Visual and Performing Arts
                - paragraph [ref=f121e125]: Visual and performing arts enrich TK–12 students’ lives by fostering creativity, self-expression, and critical thinking. Through music, dance, theater, and visual arts, students build confidence, improve collaboration and communication skills, and deepen cultural awareness.
              - article [ref=f121e127]:
                - figure [ref=f121e128]
              - paragraph [ref=f121e133]:
                - link [ref=f121e134] [cursor=pointer]:
                  - /url: /fs/pages/814
                  - text: Learn More
            - generic [ref=f121e135]:
              - generic [ref=f121e136]:
                - heading [level=2] [ref=f121e137]: High School Specialty Pathways and Academies
                - paragraph [ref=f121e138]: Discover a diverse selection of 36 specialty programs, including medical, law, digital media, agriculture, and engineering pathways, empowering students to explore passions, align learning with interests, and prepare for college or careers.
              - article [ref=f121e140]:
                - figure [ref=f121e141]
              - paragraph [ref=f121e146]:
                - link [ref=f121e147] [cursor=pointer]:
                  - /url: /fs/pages/21883
                  - text: Learn More
            - generic [ref=f121e148]:
              - generic [ref=f121e149]:
                - heading [level=2] [ref=f121e150]: Athletics
                - paragraph [ref=f121e151]: Get active with wide-ranging athletics across all grade levels—like football, basketball, soccer, volleyball, track, softball, golf, water polo, cheer, and more! At SCUSD, we're proud of our CIF student athletes.
              - article [ref=f121e153]:
                - figure [ref=f121e154]
              - paragraph [ref=f121e159]:
                - link [ref=f121e160] [cursor=pointer]:
                  - /url: /fs/pages/805
                  - text: Learn More
            - generic [ref=f121e161]:
              - generic [ref=f121e162]:
                - heading [level=2] [ref=f121e163]: Toddler and Preschool Programs
                - paragraph [ref=f121e164]: Our infant, toddler, and preschool programs serve children aged eight weeks through five years old and support early learning, social skill development, and school readiness within caring and safe environments.
              - article [ref=f121e166]:
                - figure [ref=f121e167]
              - paragraph [ref=f121e172]:
                - link [ref=f121e173] [cursor=pointer]:
                  - /url: /fs/pages/809
                  - text: Learn More
            - generic [ref=f121e174]:
              - generic [ref=f121e175]:
                - heading [level=2] [ref=f121e176]: Small High Schools
                - paragraph [ref=f121e177]: Our small high schools give students an opportunity to deep dive on subject matter and project-based learning that aligns with their future college and career pursuits while experiencing a close-knit community and personalized support.
              - article [ref=f121e179]:
                - figure [ref=f121e180]
              - paragraph [ref=f121e185]:
                - link [ref=f121e186] [cursor=pointer]:
                  - /url: /fs/pages/21874
                  - text: Learn More
            - generic [ref=f121e187]:
              - generic [ref=f121e188]:
                - heading [level=2] [ref=f121e189]: Public Waldorf
                - paragraph [ref=f121e190]: Offering a creative approach to learning, Waldorf-inspired public schools nurture the whole child and are a great fit for students who thrive in imaginative learning environments. Our district has Waldorf options at any grade level.
              - article [ref=f121e192]:
                - figure [ref=f121e193]
              - paragraph [ref=f121e198]:
                - link [ref=f121e199] [cursor=pointer]:
                  - /url: /fs/pages/21879
                  - text: Learn More
            - generic [ref=f121e200]:
              - generic [ref=f121e201]:
                - heading [level=2] [ref=f121e202]: STEAM Schools
                - paragraph [ref=f121e203]: Integrating science, technology, engineering, arts, and math (STEAM) into core subject teaching and learning helps students become creative, innovative, and well-rounded problem solvers.
              - article [ref=f121e205]:
                - figure [ref=f121e206]
              - paragraph [ref=f121e211]:
                - link [ref=f121e212] [cursor=pointer]:
                  - /url: /fs/pages/21884
                  - text: Learn More
            - generic [ref=f121e213]:
              - generic [ref=f121e214]:
                - heading [level=2] [ref=f121e215]: Adult Education
                - paragraph [ref=f121e216]: We empower our community to achieve personal, academic, and social mobility goals, with programs for adults with disabilities, English learners, and anyone who wants to complete high school or build new career skills.
              - article [ref=f121e218]:
                - figure [ref=f121e219]
              - paragraph [ref=f121e224]:
                - link [ref=f121e225] [cursor=pointer]:
                  - /url: /fs/pages/18619
                  - text: Learn More

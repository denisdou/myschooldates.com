              - button "Next" [ref=f87e801] [cursor=pointer]:  Next
            - paragraph [ref=f87e804]: The Long Beach Unified School District has earned a reputation as one of America's finest school systems, winning many awards as a national and international model of excellence.
        - generic [ref=f87e805]:
          - generic [ref=f87e807]:
            - heading [level=2] [ref=f87e808]:
              - text: LBUSD Commitment to
              - emphasis [ref=f87e809]: Excellence & Equity
            - paragraph [ref=f87e810]: LBUSD values all students and recognizes that student diversity and uniqueness add to the fabric of our district. We create school communities that promote appreciation and acceptance of student differences where all students feel a sense of belonging.
          - generic [ref=f87e811]:
            - button "Previous" [disabled] [ref=f87e812] [cursor=pointer]:  Previous

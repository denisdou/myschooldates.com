                - generic [ref=f87e821]:
                  - heading "Setting the Stage for Long Beach's Equity Story" [level=2] [ref=f87e822]
                  - paragraph [ref=f87e823]: Over the greater part of two decades, our equity-centered commitments have profoundly shaped and are continuing to shape every facet of how we do business in our district.
                  - paragraph [ref=f87e824]:
                    - link "Learn about our journey from the perspectives of our senior district leaders" [ref=f87e825] [cursor=pointer]:
                      - /url: /fs/pages/27864
                    - text: .
                  - generic [ref=f87e826]: 1 / 5
              - generic [ref=f87e827]:
                - figure [ref=f87e830]
                - generic [ref=f87e833]:
                  - heading [level=2] [ref=f87e834]: District ‘Beating the Odds’
                  - paragraph [ref=f87e835]: LBUSD was listed among California “Districts Beating the Odds” by the Learning Policy Institute. Long Beach was identified as a "positive outlier" district where Hispanic, white and African American students achieve at higher than predicted levels, performing better than students of similar racial, ethnic and socioeconomic backgrounds in most other districts.
                  - generic [ref=f87e836]: 2 / 5
              - generic [ref=f87e837]:
                - figure [ref=f87e840]
                - generic [ref=f87e843]:
                  - heading [level=2] [ref=f87e844]: Top L.A. County Public Schools
                  - paragraph [ref=f87e845]: Twenty-two LBUSD schools were among 278 in Los Angeles County leading the way toward closing achievement gaps for low-income African American and Latino students, “Top Los Angeles County Public Schools.” The University of Southern California's Rossier School of Education and its Sol Price School of Public Policy partnered with the non-profit Innovate Public Schools on the study, which also was supported by the Eli and Edythe Broad Foundation.
                  - generic [ref=f87e846]: 3 / 5
              - generic [ref=f87e847]:
                - figure [ref=f87e850]
                - generic [ref=f87e853]:
                  - heading [level=2] [ref=f87e854]: Top Magnet School in State
                  - paragraph [ref=f87e855]: LBUSD’s California Academy of Mathematics and Science has repeatedly ranked No. 1 among magnet high schools statewide according to niche.com’s annual list of California’s top high schools. CAMS has earned an A-plus grade in academics, teachers, diversity, college prep, and health and safety.
                  - generic [ref=f87e856]: 4 / 5
              - generic [ref=f87e857]:
                - figure [ref=f87e860]
                - generic [ref=f87e863]:
                  - heading [level=2] [ref=f87e864]: Advanced Placement Course Inclusion
                  - paragraph [ref=f87e865]: Data from the Washington, D.C.-based Council of the Great City Schools depicted Long Beach as a national leader in providing students greater access to Advanced Placement college preparatory courses. A report looked at 48 of the nation’s largest school systems and found that the LBUSD ranked first nationally on the percentage of African American male students who took one or more AP courses; ranked second on the overall percentage of students who took one or more AP courses; ranked second on the percentage of Hispanic male students who took one or more AP courses; ranked second on the percentage of reduced price lunch students who took one or more AP courses; and ranked second on the percentage of students with disabilities who took one or more AP courses.
                  - generic [ref=f87e866]: 5 / 5

              - generic [ref=f125e696]:
                - generic [ref=f125e697]: 90.7% high school graduation rate
                - paragraph [ref=f125e699]: This percentage of students graduating in four years in 2025 to be higher than 2022 and 2023 rates, while the five-year rate of 93.1% is the highest in district history.
            - 'article " #1 in NC for National Board Certified teachers" [ref=f125e700] [cursor=pointer]':

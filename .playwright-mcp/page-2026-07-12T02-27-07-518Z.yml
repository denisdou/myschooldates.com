        - generic [ref=f125e626]:
          - heading "In The Spotlight" [level=2] [ref=f125e628]
          - generic [ref=f125e630]:
            - article [ref=f125e631]:
              - link [ref=f125e632] [cursor=pointer]:
                - /url: https://www.wcpss.net/student-life/safety-and-security/standard-response-protocol
                - generic "Person locking a door" [ref=f125e633]:
                  - img "Person locking a door" [ref=f125e634]
              - generic [ref=f125e635]:
                - link "New Emergency Response Procedures" [ref=f125e637] [cursor=pointer]:
                  - /url: https://www.wcpss.net/student-life/safety-and-security/standard-response-protocol
                - paragraph [ref=f125e639]: The Standard Response Protocol (SRP) is a new set of actions and procedures to be used for emergency situations, taking effect in the 2026-27 school year. Once implemented, these actions and guidelines will replace our current Lockdown Codes (Code Red, Code Yellow, Code Green).
            - article [ref=f125e640]:
              - link [ref=f125e641] [cursor=pointer]:
                - /url: https://www.wcpss.net/academics/high-school/senior-spotlights
                - generic "graduates smile at the camera" [ref=f125e642]:
                  - img "graduates smile at the camera" [ref=f125e643]
              - generic [ref=f125e644]:
                - link "Senior Spotlights (opens in new window/tab)" [ref=f125e646] [cursor=pointer]:
                  - /url: https://www.wcpss.net/academics/high-school/senior-spotlights
                  - text: Senior Spotlights
                  - generic [ref=f125e647]: (opens in new window/tab)
                - paragraph [ref=f125e649]: Meet some of the remarkable members of the Class of 2026 whose leadership, service, talent and determination have left a lasting impact on their schools and the broader community. Our Senior Spotlights celebrate students who are making a difference, inspiring their peers and helping to shape our future.
            - article [ref=f125e650]:
              - link [ref=f125e651] [cursor=pointer]:
                - /url: https://www.wcpss.net/about-us/finance/2026-27-proposed-budget
                - generic "Board of Education's Proposed 2026-27 Budget" [ref=f125e652]:
                  - img "Board of Education's Proposed 2026-27 Budget" [ref=f125e653]
              - generic [ref=f125e654]:
                - link "Board of Education's Proposed 2026-27 Budget" [ref=f125e656] [cursor=pointer]:
                  - /url: https://www.wcpss.net/about-us/finance/2026-27-proposed-budget
                - paragraph [ref=f125e658]: On May 5, the Board of Education approved its Proposed Budget for the 2026-27 school year. It includes a proposed increase of $25.3 million in local funding, as well as strategic spending reductions to balance the budget. The budget proposal has been sent to the Wake County Board of Commissioners for consideration. A final budget is expected to be approved on June 1.
        - generic [ref=f125e659]:
          - heading "Excellence and Equity" [level=2] [ref=f125e661]
          - generic [ref=f125e663]:
            - article "144 schools met or exceeded growth goals" [ref=f125e664] [cursor=pointer]:
              - generic "Student eating tacos in the cafeteria" [ref=f125e665]:
                - img "Student eating tacos in the cafeteria" [ref=f125e666]
              - generic [ref=f125e668]:
                - generic [ref=f125e669]: 144 schools met or exceeded growth goals
                - paragraph [ref=f125e671]: 74% of our schools met or exceeded expected growth in 2024-25 as measured by the N.C. Department of Public Instruction.
            - article " Top magnet programs in the nation" [ref=f125e672] [cursor=pointer]:
              - paragraph [ref=f125e675]: 51 magnet schools win National Merit Awards, 18 named Top Schools of Excellence
            - article "27 Purple Star award winners" [ref=f125e676] [cursor=pointer]:
              - generic "JROTC students posing with platoon flag" [ref=f125e677]:
                - img "JROTC students posing with platoon flag" [ref=f125e678]
              - generic [ref=f125e680]:
                - generic [ref=f125e681]: 27 Purple Star award winners
                - paragraph [ref=f125e683]: These schools received the prestigious statewide recognition for supporting students and families connected to our nation's military.
            - article " 43% of educators with advanced degrees" [ref=f125e684] [cursor=pointer]:
              - paragraph [ref=f125e687]: Teachers with advanced degrees refine their instructional strategies and provide specialized support in areas such as special education and literacy.
            - article " $143 million in scholarships awarded" [ref=f125e688] [cursor=pointer]:
              - paragraph [ref=f125e691]: The Class of 2025 earned many prestigious honors to help them attend colleges, universities, and training programs.
            - article "90.7% high school graduation rate" [ref=f125e692] [cursor=pointer]:
              - generic "Photo of two female students at high school graduation" [ref=f125e693]:

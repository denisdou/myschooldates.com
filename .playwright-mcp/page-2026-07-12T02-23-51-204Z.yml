        - heading "FWISD Graduates" [level=1] [ref=f69e424]
        - generic [ref=f69e425]:
          - generic [ref=f69e428]:
            - tabpanel "1 of 6" [ref=f69e429]:
              - generic [ref=f69e430]:
                - heading "Didier Mercado" [level=2] [ref=f69e431]
                - paragraph [ref=f69e433]: World Languages Institute Class of 2026
              - article [ref=f69e435]:
                - figure [ref=f69e436]:
                  - img "Person wearing a black cape with red lining holds a classical guitar in front of a display of international flags and school banners. The person faces the camera, with one hand on the neck of the guitar and the other resting near the strings, while standing indoors in a decorated space." [ref=f69e438]
              - blockquote [ref=f69e441]:
                - text: 
                - paragraph [ref=f69e442]: Since sixth grade, Didier Mercado has been part of the school’s Estudiantina program, a traditional string ensemble rooted in Spanish heritage and closely tied to Mexican culture.
                - paragraph [ref=f69e443]: Beyond music, he says the program has taught him valuable lessons about teamwork and dedication. “It’s not just about how well you perform individually,” he said. “It’s about the whole group and working together to create something.”
                - text: 
            - tabpanel [ref=f69e444]:
              - generic [ref=f69e445]:
                - heading [level=2] [ref=f69e446]: Penny Diamantopolous
                - paragraph [ref=f69e448]: Young Women’s Leadership Academy Class of 2026
              - article [ref=f69e450]:
                - figure [ref=f69e451]
              - blockquote [ref=f69e456]:
                - text: 
                - paragraph [ref=f69e457]: Through internships with SiNaCa and the Modern Art Museum of Fort Worth, Penny explored how museums manage collections, analyze trends, and engage their communities. She now hopes to pursue a career in collection management, using data and organization to help preserve and curate art.
                - text: 
            - tabpanel [ref=f69e458]:
              - generic [ref=f69e459]:
                - heading [level=2] [ref=f69e460]: Andres Vasquez
                - paragraph [ref=f69e462]: Trimble Tech Class of 2026
              - article [ref=f69e464]:
                - figure [ref=f69e465]
              - blockquote [ref=f69e470]:
                - text: 
                - paragraph [ref=f69e471]: During Andres Vasquez's time at Trimble Tech High School, he served as the president of the National Honor Society, vice president of the National Art Honor Society, class treasurer, parliamentarian for United Voices for Change, and involved in the Bulldog Crew and Leaders in Training. He also played football and ran track. He also spent two years working at the Fort Worth Zoo.
                - text: 
            - tabpanel [ref=f69e472]:
              - generic [ref=f69e473]:
                - heading [level=2] [ref=f69e474]: Dahlia Huezo
                - paragraph [ref=f69e476]: South Hills Class of 2026
              - article [ref=f69e478]:
                - figure [ref=f69e479]
              - blockquote [ref=f69e484]:
                - text: 
                - paragraph [ref=f69e485]: At South Hills High School, senior Dahlia Huezo has developed a photography style that blends emotion, identity, and community into cinematic, deeply personal images. Her work recently earned first place in the Fort Worth ISD Top 10 Senior Art Showcase!
                - text: 
            - tabpanel [ref=f69e486]:
              - generic [ref=f69e487]:
                - heading [level=2] [ref=f69e488]: Daniel Sanders
                - paragraph [ref=f69e490]: Marine Creek Collegiate Class of 2026
              - article [ref=f69e492]:
                - figure [ref=f69e493]
              - blockquote [ref=f69e498]:
                - text: 
                - paragraph [ref=f69e499]: For his entire life, Daniel Sanders’ family instilled in him the importance of service. His parents modeled it for him, and he practices it every week at church. Now, the Marine Creek Collegiate High School senior will serve his country.
                - paragraph [ref=f69e500]: Daniel is part of a select few graduating seniors who will get to attend the United States Air Force Academy.
                - text: 
            - tabpanel [ref=f69e501]:
              - generic [ref=f69e502]:
                - heading [level=2] [ref=f69e503]: Avery Glazner
                - paragraph [ref=f69e505]: Benbrook MH Class of 2026
              - article [ref=f69e507]:
                - figure [ref=f69e508]
              - blockquote [ref=f69e513]:
                - text: 
                - paragraph [ref=f69e514]: A state championship didn’t change who Avery Glazner is, it simply confirmed what she had been building toward for years. The Benbrook Middle-High School senior has spent much of her life learning that success in golf, like life, comes down to consistency, patience, and a willingness to keep showing up.
                - text: 

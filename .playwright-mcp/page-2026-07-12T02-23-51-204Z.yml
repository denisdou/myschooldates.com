          - generic [ref=f69e528]:
            - tabpanel "1 of 6" [ref=f69e529]:
              - heading "2,171" [level=2] [ref=f69e531]
              - paragraph [ref=f69e532]: Over 2,100 industry-recognized certifications earned—equipping our students with real-world skills that lead to real-world success..
            - tabpanel [ref=f69e533]:
              - heading [level=2] [ref=f69e535]: "266"
              - paragraph [ref=f69e536]: With 266 AP courses available, we’re empowering students with rigorous academics and limitless opportunities to excel.
            - tabpanel [ref=f69e537]:
              - heading [level=2] [ref=f69e539]: "6"
              - paragraph [ref=f69e540]: Six standout scholars recognized as National Merit Semifinalists—proof of our district’s commitment to academic excellence.
            - tabpanel [ref=f69e541]:
              - heading [level=2] [ref=f69e543]: $236,301,824
              - paragraph [ref=f69e544]: The Class of 2025 secured over $236 million in scholarships and grants—opening doors and shaping futures.
            - tabpanel [ref=f69e545]:
              - heading [level=2] [ref=f69e547]: 65%
              - paragraph [ref=f69e548]: Fort Worth ISD serves a majority of Hispanic and Emergent Bilingual students. Through Dual Language programs, every student has the opportunity to become bilingual — which celebrates diversity and gives graduates another skill for the workforce!
            - tabpanel [ref=f69e549]:
              - heading [level=2] [ref=f69e551]: 13,000
              - paragraph [ref=f69e552]: If it takes a village to raise a child, then FWISD has the best one. With 13,000 volunteers logging over 42,000 hours of volunteer work, Fort Worth children are well cared for.
